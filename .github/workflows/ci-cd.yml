name: Server Deployment

on:
  workflow_run:
    workflows:
      - CI/CD
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional GHCR image tag to deploy
        required: false
        default: latest

concurrency:
  group: server-deploy-${{ github.event.workflow_run.head_branch || github.ref_name || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-to-server:
    name: Deploy Frontend + Backend + MongoDB
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out workflow commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check out manual ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Normalize GHCR owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: meta
        env:
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag }}
          WORKFLOW_IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            echo "image_tag=${WORKFLOW_IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${MANUAL_IMAGE_TAG:-latest}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check deployment secrets
        id: secrets_check
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH GHCR_READ_TOKEN; do
            if [ -z "${!name}" ]; then
              echo "::notice title=CD skipped::$name secret is not configured."
              missing=1
            fi
          done
          echo "missing=$missing" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH key
        if: steps.secrets_check.outputs.missing == '0'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Trust remote host
        if: steps.secrets_check.outputs.missing == '0'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          port="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "$port" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment assets
        if: steps.secrets_check.outputs.missing == '0'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          port="${DEPLOY_PORT:-22}"
          ssh -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p '$DEPLOY_PATH/infra' '$DEPLOY_PATH/scripts'"
          scp -P "$port" infra/docker-compose.prod.yml "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/infra/docker-compose.prod.yml"
          scp -P "$port" scripts/deploy_remote.sh "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/deploy_remote.sh"

      - name: Upload deployment environment file
        if: steps.secrets_check.outputs.missing == '0'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_OWNER: ${{ steps.owner.outputs.value }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          port="${DEPLOY_PORT:-22}"
          cat > /tmp/paris-ai-agent.deploy.env <<EOF
          DEPLOY_PATH=$DEPLOY_PATH
          GHCR_OWNER=$GHCR_OWNER
          GHCR_READ_TOKEN=$GHCR_READ_TOKEN
          GHCR_USERNAME=${GITHUB_REPOSITORY_OWNER}
          IMAGE_TAG=$IMAGE_TAG
          EOF
          scp -P "$port" /tmp/paris-ai-agent.deploy.env "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/.deploy.env"

      - name: Run remote deployment
        if: steps.secrets_check.outputs.missing == '0'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          port="${DEPLOY_PORT:-22}"
          ssh -p "$port" "$DEPLOY_USER@$DEPLOY_HOST" "chmod +x '$DEPLOY_PATH/scripts/deploy_remote.sh' && set -a && . '$DEPLOY_PATH/.deploy.env' && set +a && '$DEPLOY_PATH/scripts/deploy_remote.sh' && rm -f '$DEPLOY_PATH/.deploy.env'"
