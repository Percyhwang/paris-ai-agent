name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: paris-ai-agent-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: paris-ai-agent-backend
  FRONTEND_IMAGE_NAME: paris-ai-agent-frontend

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend
      VITE_API_BASE_URL: /api
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_ALLOWED_ORIGINS: ${{ secrets.VITE_GOOGLE_ALLOWED_ORIGINS }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
      VITE_HOME_BACKGROUND_URL: ${{ secrets.VITE_HOME_BACKGROUND_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend and parser dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r parser_api/requirements.txt

      - name: Run backend unit tests
        run: python -m unittest discover -s backend/tests

      - name: Check backend app imports
        run: python -c "import app.main"

      - name: Run parser API unit tests
        run: python -m unittest parser_api.tests.test_parser_regressions parser_api.tests.test_agent_service

  docker:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_namespace: ${{ steps.images.outputs.image_namespace }}
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          image_namespace="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          backend_image="${REGISTRY}/${image_namespace}/${BACKEND_IMAGE_NAME}"
          frontend_image="${REGISTRY}/${image_namespace}/${FRONTEND_IMAGE_NAME}"
          echo "image_namespace=${image_namespace}" >> "${GITHUB_OUTPUT}"
          echo "backend_image=${backend_image}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${frontend_image}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push backend image
        env:
          BACKEND_IMAGE: ${{ steps.images.outputs.backend_image }}
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag "${BACKEND_IMAGE}:${GITHUB_SHA}" \
            --tag "${BACKEND_IMAGE}:latest" \
            .
          docker push "${BACKEND_IMAGE}:${GITHUB_SHA}"
          docker push "${BACKEND_IMAGE}:latest"

      - name: Build and push frontend image
        env:
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend_image }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_ALLOWED_ORIGINS: ${{ secrets.VITE_GOOGLE_ALLOWED_ORIGINS }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_HOME_BACKGROUND_URL: ${{ secrets.VITE_HOME_BACKGROUND_URL }}
        run: |
          docker build \
            --file frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL=/api \
            --build-arg VITE_GOOGLE_CLIENT_ID="${VITE_GOOGLE_CLIENT_ID}" \
            --build-arg VITE_GOOGLE_ALLOWED_ORIGINS="${VITE_GOOGLE_ALLOWED_ORIGINS}" \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${VITE_GOOGLE_MAPS_API_KEY}" \
            --build-arg VITE_HOME_BACKGROUND_URL="${VITE_HOME_BACKGROUND_URL}" \
            --tag "${FRONTEND_IMAGE}:${GITHUB_SHA}" \
            --tag "${FRONTEND_IMAGE}:latest" \
            ./frontend
          docker push "${FRONTEND_IMAGE}:${GITHUB_SHA}"
          docker push "${FRONTEND_IMAGE}:latest"

  deploy:
    name: Deploy to Docker host
    runs-on: ubuntu-latest
    needs: docker
    environment: production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check deployment secrets
        id: deploy_secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          missing=()
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            if [ -z "${!name}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::notice::Skipping SSH deploy. Missing GitHub Secrets: ${missing[*]}"
            echo "ready=false" >> "${GITHUB_OUTPUT}"
          else
            echo "ready=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create production env file
        if: steps.deploy_secrets.outputs.ready == 'true'
        env:
          IMAGE_NAMESPACE: ${{ needs.docker.outputs.image_namespace }}
          IMAGE_TAG: ${{ github.sha }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          MONGODB_DB: ${{ secrets.MONGODB_DB }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          ENABLE_GOOGLE_FOOD_SEARCH: ${{ secrets.ENABLE_GOOGLE_FOOD_SEARCH }}
          GOOGLE_ROUTES_API_KEY: ${{ secrets.GOOGLE_ROUTES_API_KEY }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          REFRESH_TOKEN_EXPIRE_DAYS: ${{ secrets.REFRESH_TOKEN_EXPIRE_DAYS }}
          WEATHER_API_URL: ${{ secrets.WEATHER_API_URL }}
          WEATHER_CACHE_TTL_MINUTES: ${{ secrets.WEATHER_CACHE_TTL_MINUTES }}
          EXTERNAL_AGENT_API_URL: ${{ secrets.EXTERNAL_AGENT_API_URL }}
          LLM_DIARY_API_URL: ${{ secrets.LLM_DIARY_API_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          KIWI_RAPIDAPI_HOST: ${{ secrets.KIWI_RAPIDAPI_HOST }}
          BOOKING_RAPIDAPI_HOST: ${{ secrets.BOOKING_RAPIDAPI_HOST }}
        shell: bash
        run: |
          write_env() {
            local key="$1"
            local value="${2:-}"
            value="${value//$'\r'/}"
            value="${value//$'\n'/\\n}"
            printf '%s=%s\n' "${key}" "${value}" >> .env.production
          }

          : > .env.production
          write_env IMAGE_NAMESPACE "${IMAGE_NAMESPACE}"
          write_env IMAGE_TAG "${IMAGE_TAG}"
          write_env APP_ENV "production"
          write_env FRONTEND_ORIGIN "${FRONTEND_ORIGIN:-http://${DEPLOY_HOST}}"
          write_env FRONTEND_PORT "${FRONTEND_PORT:-80}"
          write_env BACKEND_PORT "${BACKEND_PORT:-127.0.0.1:8010}"
          write_env MONGODB_URI "mongodb://mongo:27017"
          write_env MONGODB_DB "${MONGODB_DB:-paris_ai_agent}"
          write_env GOOGLE_CLIENT_ID "${GOOGLE_CLIENT_ID}"
          write_env GOOGLE_PLACES_API_KEY "${GOOGLE_PLACES_API_KEY}"
          write_env ENABLE_GOOGLE_FOOD_SEARCH "${ENABLE_GOOGLE_FOOD_SEARCH:-true}"
          write_env GOOGLE_ROUTES_API_KEY "${GOOGLE_ROUTES_API_KEY}"
          write_env JWT_PRIVATE_KEY "${JWT_PRIVATE_KEY}"
          write_env JWT_PUBLIC_KEY "${JWT_PUBLIC_KEY}"
          write_env ACCESS_TOKEN_EXPIRE_MINUTES "${ACCESS_TOKEN_EXPIRE_MINUTES:-30}"
          write_env REFRESH_TOKEN_EXPIRE_DAYS "${REFRESH_TOKEN_EXPIRE_DAYS:-14}"
          write_env ALLOW_INSECURE_DEV_AUTH "false"
          write_env WEATHER_API_URL "${WEATHER_API_URL}"
          write_env WEATHER_CACHE_TTL_MINUTES "${WEATHER_CACHE_TTL_MINUTES:-30}"
          write_env EXTERNAL_AGENT_API_URL "${EXTERNAL_AGENT_API_URL}"
          write_env LLM_DIARY_API_URL "${LLM_DIARY_API_URL}"
          write_env OPENAI_API_KEY "${OPENAI_API_KEY}"
          write_env RAPIDAPI_KEY "${RAPIDAPI_KEY}"
          write_env KIWI_RAPIDAPI_HOST "${KIWI_RAPIDAPI_HOST:-kiwi-com-flights-api.p.rapidapi.com}"
          write_env BOOKING_RAPIDAPI_HOST "${BOOKING_RAPIDAPI_HOST:-booking-com15.p.rapidapi.com}"

      - name: Connect WireGuard VPN
        if: steps.deploy_secrets.outputs.ready == 'true' && secrets.WG_CONFIG != ''
        env:
          WG_CONFIG: ${{ secrets.WG_CONFIG }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools
          sudo mkdir -p /etc/wireguard
          printf '%s\n' "${WG_CONFIG}" | sudo tee /etc/wireguard/deploy.conf > /dev/null
          sudo chmod 600 /etc/wireguard/deploy.conf
          sudo sed -i '/^[[:space:]]*DNS[[:space:]]*=/d' /etc/wireguard/deploy.conf
          sudo wg-quick up deploy
          sudo wg show deploy

      - name: Install SSH key
        if: steps.deploy_secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Upload Compose files
        if: steps.deploy_secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        shell: bash
        run: |
          app_dir="${DEPLOY_PATH:-/opt/paris-ai-agent}"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${app_dir}'"
          scp docker-compose.prod.yml .env.production "${DEPLOY_USER}@${DEPLOY_HOST}:${app_dir}/"

      - name: Run remote deployment
        if: steps.deploy_secrets.outputs.ready == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        shell: bash
        run: |
          app_dir="${DEPLOY_PATH:-/opt/paris-ai-agent}"

          if [ -n "${GHCR_TOKEN}" ]; then
            printf '%s' "${GHCR_TOKEN}" | ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
              "docker login ghcr.io -u '${GHCR_USERNAME:-${GITHUB_ACTOR}}' --password-stdin"
          fi

          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${app_dir}' && docker compose --env-file .env.production -f docker-compose.prod.yml pull"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "cd '${app_dir}' && docker compose --env-file .env.production -f docker-compose.prod.yml up -d"
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "docker image prune -f"
