name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: paris-ai-agent-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: paris-ai-agent-backend
  FRONTEND_IMAGE_NAME: paris-ai-agent-frontend

jobs:
  ci:
    name: Test and build
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/backend
      VITE_API_BASE_URL: /api
      VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
      VITE_GOOGLE_ALLOWED_ORIGINS: ${{ secrets.VITE_GOOGLE_ALLOWED_ORIGINS }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
      VITE_HOME_BACKGROUND_URL: ${{ secrets.VITE_HOME_BACKGROUND_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend and parser dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt -r parser_api/requirements.txt

      - name: Run backend unit tests
        run: python -m unittest discover -s backend/tests

      - name: Check backend app imports
        run: python -c "import app.main"

      - name: Run parser API unit tests
        run: python -m unittest parser_api.tests.test_parser_regressions parser_api.tests.test_agent_service

  docker:
    name: Build and publish images
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_namespace: ${{ steps.images.outputs.image_namespace }}
      backend_image: ${{ steps.images.outputs.backend_image }}
      frontend_image: ${{ steps.images.outputs.frontend_image }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image names
        id: images
        shell: bash
        run: |
          image_namespace="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          backend_image="${REGISTRY}/${image_namespace}/${BACKEND_IMAGE_NAME}"
          frontend_image="${REGISTRY}/${image_namespace}/${FRONTEND_IMAGE_NAME}"
          echo "image_namespace=${image_namespace}" >> "${GITHUB_OUTPUT}"
          echo "backend_image=${backend_image}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${frontend_image}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${REGISTRY}" -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and push backend image
        env:
          BACKEND_IMAGE: ${{ steps.images.outputs.backend_image }}
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag "${BACKEND_IMAGE}:${GITHUB_SHA}" \
            --tag "${BACKEND_IMAGE}:latest" \
            .
          docker push "${BACKEND_IMAGE}:${GITHUB_SHA}"
          docker push "${BACKEND_IMAGE}:latest"

      - name: Build and push frontend image
        env:
          FRONTEND_IMAGE: ${{ steps.images.outputs.frontend_image }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_ALLOWED_ORIGINS: ${{ secrets.VITE_GOOGLE_ALLOWED_ORIGINS }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_HOME_BACKGROUND_URL: ${{ secrets.VITE_HOME_BACKGROUND_URL }}
        run: |
          docker build \
            --file frontend/Dockerfile \
            --build-arg VITE_API_BASE_URL=/api \
            --build-arg VITE_GOOGLE_CLIENT_ID="${VITE_GOOGLE_CLIENT_ID}" \
            --build-arg VITE_GOOGLE_ALLOWED_ORIGINS="${VITE_GOOGLE_ALLOWED_ORIGINS}" \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${VITE_GOOGLE_MAPS_API_KEY}" \
            --build-arg VITE_HOME_BACKGROUND_URL="${VITE_HOME_BACKGROUND_URL}" \
            --tag "${FRONTEND_IMAGE}:${GITHUB_SHA}" \
            --tag "${FRONTEND_IMAGE}:latest" \
            ./frontend
          docker push "${FRONTEND_IMAGE}:${GITHUB_SHA}"
          docker push "${FRONTEND_IMAGE}:latest"

  deploy:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend for GitHub Pages
        working-directory: frontend
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          FRONTEND_ORIGIN: ${{ secrets.FRONTEND_ORIGIN }}
          PUBLIC_API_BASE_URL: ${{ secrets.PUBLIC_API_BASE_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_ALLOWED_ORIGINS: ${{ secrets.VITE_GOOGLE_ALLOWED_ORIGINS }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_HOME_BACKGROUND_URL: ${{ secrets.VITE_HOME_BACKGROUND_URL }}
          VITE_STATIC_DEMO_AUTH: "false"
        run: |
          looks_public_https_origin() {
            local value="${1:-}"
            local candidate host_port host

            value="${value%%,*}"
            [ -n "$value" ] || return 1

            if [ "${value#https://}" != "$value" ]; then
              candidate="$value"
            elif [ "${value#http://}" != "$value" ]; then
              return 1
            else
              candidate="https://${value}"
            fi

            host_port="${candidate#https://}"
            host_port="${host_port%%/*}"
            host="${host_port%%:*}"

            [ -n "$host" ] || return 1
            [ "$host" != "localhost" ] || return 1
            case "$host" in
              *.local) return 1 ;;
              10.*|127.*|0.*|169.254.*|192.168.*) return 1 ;;
              172.16.*|172.17.*|172.18.*|172.19.*|172.2?.*|172.30.*|172.31.*) return 1 ;;
              \[*\]) return 1 ;;
            esac

            return 0
          }

          normalize_api_base() {
            local value="$1"
            if [ -z "$value" ]; then
              return 1
            fi

            local normalized
            if [ "${value#http://}" != "$value" ] || [ "${value#https://}" != "$value" ]; then
              normalized="${value%/}"
            else
              normalized="https://${value%/}"
            fi

            case "$normalized" in
              */api) printf '%s\n' "$normalized" ;;
              *) printf '%s/api\n' "$normalized" ;;
            esac
          }

          selected_api_base=""
          if looks_public_https_origin "${PUBLIC_API_BASE_URL:-}"; then
            selected_api_base="$(normalize_api_base "${PUBLIC_API_BASE_URL}")"
          elif looks_public_https_origin "${FRONTEND_ORIGIN:-}"; then
            selected_api_base="$(normalize_api_base "${FRONTEND_ORIGIN}")"
          elif looks_public_https_origin "${DEPLOY_HOST:-}"; then
            selected_api_base="$(normalize_api_base "${DEPLOY_HOST}")"
          else
            selected_api_base="https://paris-ai-agent.onrender.com/api"
          fi

          export VITE_API_BASE_URL="${selected_api_base}"
          echo "GitHub Pages API base: ${VITE_API_BASE_URL}"
          npm ci
          npm run build -- --base=/paris-ai-agent/

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
