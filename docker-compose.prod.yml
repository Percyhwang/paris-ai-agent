name: paris-ai-agent

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${IMAGE_NAMESPACE:?set IMAGE_NAMESPACE}/paris-ai-agent-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: ${MONGODB_DB:-paris_ai_agent}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost}
      ALLOW_INSECURE_DEV_AUTH: ${ALLOW_INSECURE_DEV_AUTH:-false}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-127.0.0.1:8010}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: ghcr.io/${IMAGE_NAMESPACE:?set IMAGE_NAMESPACE}/paris-ai-agent-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  mongo_data:
