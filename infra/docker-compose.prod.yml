services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/${GHCR_OWNER}/paris-ai-agent-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    image: ghcr.io/${GHCR_OWNER}/paris-ai-agent-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  mongo_data:
